name: tfm
channels:
  - pytorch
  - pyg  # Canal necesario para PyTorch Geometric
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy=1.26.4
  - pandas
  - matplotlib
  - scikit-learn
  - scipy        # Crítico para el solver GMRES (Matrix-Free)
  - ipykernel
  - jupyter
  - cmake        # Necesario para compilar extensiones de Qiskit Aer
  - pip:
      # --- Quantum Core ---
      - qiskit>=2.0
      - qiskit-aer>=0.15.0  # 0.15+ requerido para qiskit 2.x (0.14.x es incompatible)
      - qiskit-ibm-runtime>=0.40

      # --- Machine Learning ---
      - torch
      - torch-geometric  # El motor real para tus grafos y el Transformer

      # --- MLOps & Experiment Tracking ---
      - mlflow
      - wandb

      # --- Utilities ---
      - python-dotenv
      - tqdm
      - pylatexenc  # Requerido por qc.draw('mpl') en los notebooks
      - pylint
      - black
      - flake8
      - pre-commit
      - dvc
      - requests
