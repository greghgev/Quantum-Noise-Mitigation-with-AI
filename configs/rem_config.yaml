# REM — Readout Error Mitigation — Configuración de experimento

model:
  hidden_dim: 64            # Dimensión GNN (más pequeña que GEM — tarea más local)
  num_layers: 2             # Capas GNN
  dropout: 0.05
  matrix_size: 2            # Matrices de confusión locales: 2×2 por qubit
  gmres_max_iter: 50        # Iteraciones máximas del solver GMRES
  gmres_tol: 1.0e-6

training:
  epochs: 80
  batch_size: 64
  learning_rate: 5.0e-4
  weight_decay: 1.0e-5
  optimizer: adam
  early_stopping_patience: 10

data:
  train_days: [1, 2, 3, 4, 5]
  val_days: [6]
  test_days: [8, 9, 10]
  calibration_shots: 1024   # Shots para generar el histograma de calibración

experiment:
  seed: 42
  mlflow_experiment: "REM_v1"
  log_every_n_steps: 10
