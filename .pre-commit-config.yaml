repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.10

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args:
          - "--max-line-length=100"
          - "--extend-ignore=E203,W503"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
        # Excepciones: PDFs de la bibliografía y notebooks con gráficas embebidas
        # (el notebook 01 pesa ~574KB precisamente por los outputs que debe enseñar)
        exclude: '^doc/SOTA/papers/.*\.pdf$|\.ipynb$'
      - id: detect-private-key
